name: Setup
description: Set up Bun, restore node_modules + bun cache, install only on cache miss.

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.13

    - name: Restore dependencies cache
      id: deps-cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.bun/install/cache
          node_modules
          client/node_modules
          server/node_modules
          shared/node_modules
        key: deps-${{ runner.os }}-bun1.3.13-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          deps-${{ runner.os }}-bun1.3.13-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
